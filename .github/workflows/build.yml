name: build

on:
  push:
    branches: [main, next]
  pull_request:
    types: [opened, synchronize, reopened]

# Supersede in-progress runs for the same ref, but never cancel release
# runs on main/next - only collapse redundant PR runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Enabled permissions on GITHUB_TOKEN
permissions:
  # To be able to push to the repo
  contents: write
  # To update the pr description with canary info
  pull-requests: write
  # For pr-check to create a status
  statuses: write
  # Needed to create PR statuses/checks
  checks: write
  # To post comments on PRs
  issues: write
  # OIDC token for npm Trusted Publishing (token-less publish + provenance)
  id-token: write

env:
  GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
  NPM_TOKEN: ${{ secrets.NPM_TOKEN  }}
  PROTECTED_BRANCH_REVIEWER_TOKEN: ${{ secrets.GH_TOKEN }}
  # PR: ${{ steps.PR.outputs.number }}

jobs:
  # Run install in one step so deps can be cached for other steps
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

  build:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v6
        with:
          # full history + tags for auto's versioning
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - uses: ./.github/actions/build-cache
      - run: pnpm build

  # pr-check:
